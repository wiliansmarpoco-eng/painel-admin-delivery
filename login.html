<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login da Loja</title>
  <style>
    * {
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0f172a, #172554);
      padding: 20px;
    }

    .box {
      width: 100%;
      max-width: 420px;
      background: white;
      border-radius: 22px;
      padding: 30px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.25);
    }

    .logo {
      width: 72px;
      height: 72px;
      border-radius: 18px;
      background: linear-gradient(135deg, #ff7a18, #ff5722);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      font-weight: bold;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0 0 8px;
      color: #111827;
      font-size: 28px;
    }

    p {
      margin: 0 0 18px;
      color: #6b7280;
      line-height: 1.4;
    }

    input {
      width: 100%;
      padding: 14px;
      border: 1px solid #d1d5db;
      border-radius: 14px;
      margin-bottom: 12px;
      font-size: 15px;
      outline: none;
    }

    input:focus {
      border-color: #fb923c;
      box-shadow: 0 0 0 3px rgba(251,146,60,0.15);
    }

    button {
      width: 100%;
      border: none;
      border-radius: 14px;
      padding: 14px;
      font-size: 15px;
      font-weight: bold;
      color: white;
      background: linear-gradient(135deg, #ff7a18, #ff5722);
      cursor: pointer;
      margin-top: 4px;
    }

    button:hover {
      opacity: 0.95;
    }

    .erro {
      margin-top: 12px;
      color: #dc2626;
      font-size: 14px;
      min-height: 18px;
    }

    .info {
      margin-top: 18px;
      padding: 12px;
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 14px;
      font-size: 13px;
      color: #475569;
    }
  </style>
</head>
<body>
  <div class="box">
    <div class="logo">PJ</div>
    <h1>Painel da Loja</h1>
    <p>Entre com o acesso do estabelecimento.</p>

    <input id="email" type="email" placeholder="Email">
    <input id="senha" type="password" placeholder="Senha">
    <button onclick="entrar()">Entrar no Painel</button>

    <div id="erro" class="erro"></div>

    <div class="info">
      Login atual:<br>
      <strong>Email:</strong> admin@sistema.com<br>
      <strong>Senha:</strong> 123456
    </div>
  </div>

  <script>
   const API_URL = window.location.hostname.includes("localhost")
  ? "http://localhost:3000"
  : "https://delivery-saas-production-caba.up.railway.app";

    async function entrar() {
      const email = document.getElementById("email").value.trim();
      const senha = document.getElementById("senha").value.trim();
      const erro = document.getElementById("erro");

      erro.textContent = "";

      if (!email || !senha) {
        erro.textContent = "Preencha email e senha.";
        return;
      }

      try {
        const res = await fetch(`${API_URL}/login`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, senha })
        });

        const data = await res.json();

        if (!res.ok) {
          erro.textContent = data.erro || "Erro ao entrar.";
          return;
        }

        localStorage.setItem("usuario", JSON.stringify(data.usuario));

        if (window.location.hostname === "localhost") {
          window.location.href = "http://localhost:3000/admin.html";
        } else {
          window.location.href = "/admin.html";
        }
      } catch (e) {
        erro.textContent = "Erro de conexão com o servidor.";
      }
    }
  </script>
</body>
</html>
